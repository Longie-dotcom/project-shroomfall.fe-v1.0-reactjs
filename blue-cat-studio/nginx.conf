server {
    listen 80;
    server_name localhost;

    # ────────────────────────────────────────────────────────
    # 1. SERVE STATIC FRONTEND
    # ────────────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Essential for React Router browser routing history fallbacks
        try_files $uri $uri/ /index.html;
    }

    # ────────────────────────────────────────────────────────
    # 2. REVERSE PROXY REST API REQUESTS
    # ────────────────────────────────────────────────────────
    # No trailing slash on proxy_pass preserves the /api prefix 
    # so it matches your C# [Route("api/[controller]")] attributes
    location /api/ {
        proxy_pass http://gamems-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ────────────────────────────────────────────────────────
    # 3. REVERSE PROXY SIGNALR HUBS (WEBSOCKETS)
    # ────────────────────────────────────────────────────────
    # Matches /hubs/game and /hubs/admin mapped in Program.cs
    location /hubs/ {
        proxy_pass http://gamems-api:8080;
        proxy_http_version 1.1;
        
        # Critical headers needed to establish a WebSocket handshake link
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Optional: Custom error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}